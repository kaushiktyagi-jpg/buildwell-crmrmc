<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUILDWELL ENTERPRISE CRM</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login">
<h2>BUILDWELL ENTERPRISE CRM</h2>
<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p>admin / Kashi@123</p>
</div>

<div id="app" style="display:none">
<header><h2>Enterprise CRM</h2></header>

<div class="grid">

<div class="card">
<h3>Orders</h3>
<button onclick="addOrder()">New Order</button>
<div id="orders"></div>
</div>

<div class="card">
<h3>GPS Tracking</h3>
<p>Vehicle: ACTIVE</p>
<p>Status: LIVE</p>
</div>

<div class="card">
<h3>WhatsApp Alerts</h3>
<p>Enabled</p>
</div>

<div class="card">
<h3>GST Billing</h3>
<button onclick="bill()">Create Invoice</button>
<div id="bills"></div>
</div>

</div>
</div>

<script src="app.js"></script>
</body>
</html>
